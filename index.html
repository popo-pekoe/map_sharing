<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住所録検索マップ (Google Maps版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 0; }
        
        /* ポップアップ内の表示設定 */
        .info-window-container {
            padding: 8px;
            max-width: 320px;
            max-height: 400px;
            overflow-y: auto;
            font-family: sans-serif;
        }

        .info-content-value {
            white-space: pre-wrap;
            word-break: break-all;
            color: #374151;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .info-label {
            font-size: 11px;
            font-weight: bold;
            color: #6b7280;
            display: block;
            margin-top: 8px;
        }

        input::placeholder { font-size: 0.8rem; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-hidden">

    <!-- ヘッダー -->
    <header class="absolute top-4 left-4 right-4 h-auto md:h-16 bg-white/95 backdrop-blur shadow-xl rounded-2xl flex flex-col md:flex-row items-center justify-between px-6 py-3 md:py-0 gap-3 z-[1000] border border-white/20">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto">
            <div class="bg-blue-600 p-2 rounded-xl shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                </svg>
            </div>
            <div class="flex-1">
                <h1 class="text-sm font-bold text-gray-800 tracking-tight">拠点マップ</h1>
                <div id="status-badge" class="text-[10px] text-gray-400 font-medium">読込中...</div>
            </div>
        </div>
        
        <!-- 検索バー -->
        <div class="flex flex-col sm:flex-row gap-2 w-full max-w-2xl">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-500">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 8.293A1 1 0 013 7.586V4z" />
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="キーワードで絞り込み..." 
                    class="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
                >
            </div>

            <div class="relative flex-1 flex gap-1">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-emerald-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input type="text" id="address-search-input" placeholder="住所検索..." 
                        class="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none"
                    >
                </div>
                <button id="address-search-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-xl text-xs font-bold transition-colors">移動</button>
            </div>
        </div>
    </header>

    <main>
        <div id="map"></div>
        <div id="error-msg" class="hidden absolute top-24 left-1/2 -translate-x-1/2 z-[1000] bg-white text-red-600 px-6 py-3 rounded-xl shadow-xl border border-red-100 text-xs text-center">
            <p class="font-bold">データ取得エラー</p>
            <p class="text-[10px] text-gray-500 mt-1">スプレッドシートの公開設定を確認してください。</p>
        </div>
    </main>

    <script>
        /**
         * --- 設定エリア ---
         */
        const GOOGLE_MAPS_API_KEY = "AIzaSyDYg1z0rVrz1S3KkKqiHpWBcBzjtNr-eKY"; 
        const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRRB7Mevb336kNro8ri117cLUvo8wphBkoZdWsDCXmSry6hbYWfnjfjG8tUzSsGSlwe-BO_w4vAsto/pub?gid=1895756622&single=true&output=csv';

        let map, geocoder, infoWindow;
        let markers = [];
        let allData = [];
        let searchResultMarker = null;

        // Google Mapsスクリプトの読み込み
        function loadGoogleMaps() {
            const script = document.createElement("script");
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }

        window.initMap = function() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 35.6812, lng: 139.7671 },
                zoom: 12,
                mapTypeControl: true,
                streetViewControl: true,
                fullscreenControl: false,
                zoomControl: true,
                zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM }
            });
            geocoder = new google.maps.Geocoder();
            infoWindow = new google.maps.InfoWindow();
            fetchData();
        };

        async function fetchData() {
            Papa.parse(SHEET_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        allData = results.data;
                        renderMarkers("");
                    } else {
                        showError();
                    }
                },
                error: () => showError()
            });
        }

        function showError() {
            document.getElementById('error-msg').classList.remove('hidden');
            document.getElementById('status-badge').textContent = 'エラー';
        }

        function renderMarkers(keyword) {
            markers.forEach(m => m.setMap(null));
            markers = [];

            const lowerKeyword = keyword.toLowerCase();
            const keys = Object.keys(allData[0] || {});
            const latKey = keys.find(k => ['緯度', 'lat'].some(kw => k.toLowerCase().includes(kw)));
            const lngKey = keys.find(k => ['経度', 'lng'].some(kw => k.toLowerCase().includes(kw)));
            const nameKey = keys.find(k => ['名', 'name', 'タイトル'].some(kw => k.toLowerCase().includes(kw)));

            if (!latKey || !lngKey) return;

            const bounds = new google.maps.LatLngBounds();
            let count = 0;

            allData.forEach((row, i) => {
                const isMatch = Object.values(row).some(val => String(val).toLowerCase().includes(lowerKeyword));
                if (!isMatch) return;

                const lat = parseFloat(row[latKey]?.replace(/[^\d.-]/g, ''));
                const lng = parseFloat(row[lngKey]?.replace(/[^\d.-]/g, ''));

                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = { lat, lng };
                    const marker = new google.maps.Marker({
                        position: pos,
                        map: map,
                        title: row[nameKey] || '地点'
                    });

                    let content = `<div class="info-window-container">`;
                    content += `<div style="font-weight:bold; font-size:16px; border-bottom:2px solid #3b82f6; margin-bottom:12px; padding-bottom:6px; color:#1e40af;">${row[nameKey] || '地点 '+(i+1)}</div>`;
                    
                    Object.entries(row).forEach(([k, v]) => {
                        if (v && v.trim() !== "" && k !== latKey && k !== lngKey && k !== nameKey) {
                            content += `<span class="info-label">${k}</span>`;
                            content += `<div class="info-content-value">${v}</div>`;
                        }
                    });
                    content += `</div>`;

                    marker.addListener('click', () => {
                        infoWindow.setContent(content);
                        infoWindow.open(map, marker);
                    });

                    markers.push(marker);
                    bounds.extend(pos);
                    count++;
                }
            });

            const badge = document.getElementById('status-badge');
            if (count > 0) {
                if (keyword === "") map.fitBounds(bounds);
                badge.textContent = `${count} 件表示中`;
            } else {
                badge.textContent = `該当なし`;
            }
        }

        function searchAddress() {
            const query = document.getElementById('address-search-input').value;
            if (!query) return;
            geocoder.geocode({ address: query }, (results, status) => {
                if (status === 'OK') {
                    const pos = results[0].geometry.location;
                    map.setCenter(pos);
                    map.setZoom(17);
                    if (searchResultMarker) searchResultMarker.setMap(null);
                    searchResultMarker = new google.maps.Circle({
                        strokeColor: '#10b981',
                        fillColor: '#10b981',
                        fillOpacity: 0.35,
                        map: map,
                        center: pos,
                        radius: 30
                    });
                } else {
                    console.error("Geocode failed: " + status);
                }
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => renderMarkers(e.target.value));
        document.getElementById('address-search-btn').onclick = searchAddress;
        document.getElementById('address-search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchAddress(); });

        loadGoogleMaps();
    </script>
</body>
</html>
