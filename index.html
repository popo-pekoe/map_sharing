<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住所録検索マップ (Google Maps版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        #map { height: 100vh; width: 100%; z-index: 0; }
        
        /* ポップアップ内の表示設定 */
        .info-window-container {
            padding: 4px;
            min-width: 280px;
            max-width: 320px;
            max-height: 450px;
            overflow-y: auto;
            font-family: sans-serif;
            position: relative;
        }

        .info-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            border-bottom: 2px solid #3b82f6;
            margin-bottom: 12px;
            padding-bottom: 6px;
            padding-right: 24px;
        }

        .info-title {
            font-weight: bold;
            font-size: 16px;
            color: #1e40af;
            line-height: 1.4;
        }

        .info-content-value {
            white-space: pre-wrap;
            word-break: break-all;
            color: #374151;
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        .info-label {
            font-size: 11px;
            font-weight: bold;
            color: #9ca3af;
            display: block;
            margin-top: 6px;
        }

        /* 修正依頼ボタン */
        .correction-trigger {
            position: absolute;
            top: 0;
            right: 0;
            color: #9ca3af;
            padding: 4px;
            border-radius: 4px;
            cursor: pointer;
            transition: color 0.2s;
        }
        .correction-trigger:hover {
            color: #ef4444;
        }

        /* フォームのスタイル */
        .correction-form {
            display: none;
            margin-top: 10px;
            padding: 12px;
            background: #fef2f2;
            border-radius: 12px;
            border: 1px solid #fee2e2;
        }
        .correction-textarea {
            width: 100%;
            height: 80px;
            font-size: 13px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #fca5a5;
            margin-bottom: 10px;
            outline: none;
            background: white;
        }
        .correction-submit-btn {
            width: 100%;
            background: #ef4444;
            color: white;
            font-size: 12px;
            font-weight: bold;
            padding: 8px;
            border-radius: 8px;
        }

        input::placeholder { font-size: 0.8rem; }
    </style>
</head>
<body class="bg-gray-50 font-sans text-gray-900 overflow-hidden">

    <!-- ヘッダー -->
    <header class="absolute top-4 left-4 right-4 h-auto md:h-16 bg-white/95 backdrop-blur shadow-xl rounded-2xl flex flex-col md:flex-row items-center justify-between px-6 py-3 md:py-0 gap-3 z-[1000] border border-white/20">
        <div class="flex items-center gap-3 shrink-0 w-full md:w-auto">
            <!-- ロゴアイコン (機能削除済み) -->
            <div id="map-logo" class="bg-blue-600 p-2 rounded-xl shadow-inner">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                </svg>
            </div>
            <div class="flex-1">
                <h1 id="header-title" class="text-sm font-bold text-gray-800 tracking-tight">拠点マップ</h1>
                <div id="status-badge" class="text-[10px] text-gray-400 font-medium italic">読込中...</div>
            </div>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-2 w-full max-w-2xl">
            <div class="relative flex-1">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-500">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 8.293A1 1 0 013 7.586V4z" />
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="キーワード絞り込み..." 
                    class="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"
                >
            </div>
            <div class="relative flex-1 flex gap-1">
                <div class="relative flex-1">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-emerald-500">
                        <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </span>
                    <input type="text" id="address-search-input" placeholder="住所検索..." 
                        class="w-full pl-9 pr-4 py-2 bg-gray-100 border-none rounded-xl text-sm focus:ring-2 focus:ring-emerald-500 transition-all outline-none"
                    >
                </div>
                <button id="address-search-btn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-xl text-xs font-bold transition-colors text-nowrap">移動</button>
            </div>
        </div>
    </header>

    <main><div id="map"></div></main>

    <script>
        /**
         * --- 設定エリア ---
         */
        const GOOGLE_MAPS_API_KEY = "AIzaSyDYg1z0rVrz1S3KkKqiHpWBcBzjtNr-eKY"; 
        
        // CSV URL
        const PUBLIC_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRRB7Mevb336kNro8ri117cLUvo8wphBkoZdWsDCXmSry6hbYWfnjfjG8tUzSsGSlwe-BO_w4vAsto/pub?gid=2020407894&single=true&output=csv';
        const VIP_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQRRB7Mevb336kNro8ri117cLUvo8wphBkoZdWsDCXmSry6hbYWfnjfjG8tUzSsGSlwe-BO_w4vAsto/pub?gid=548100284&single=true&output=csv';

        const CORRECTION_GAS_URL = "https://script.google.com/macros/s/AKfycbza6D9o3nwIpQbzZRx3BXFwJnpkBO8R3OH9nmTtszExj1EvShdXyiXj1tQcx169hGiaPQ/exec"; 

        let map, geocoder, infoWindow;
        let markers = [];
        let allData = [];
        let currentUrl = PUBLIC_CSV_URL;

        function loadGoogleMaps() {
            const script = document.createElement("script");
            script.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap`;
            script.async = true;
            script.defer = true;
            document.head.appendChild(script);
        }

        window.initMap = function() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: { lat: 35.6812, lng: 139.7671 },
                zoom: 12,
                mapTypeControl: true,
                streetViewControl: true,
                zoomControl: true,
                zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM }
            });
            geocoder = new google.maps.Geocoder();
            infoWindow = new google.maps.InfoWindow();

            // URLパラメータをチェックしてモードを判定
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'vip') {
                enableVipMode();
            } else {
                fetchData(PUBLIC_CSV_URL);
            }
        };

        // VIPモードを有効化する
        function enableVipMode() {
            currentUrl = VIP_CSV_URL;
            document.getElementById('header-title').textContent = "管理者用マップ ★";
            fetchData(VIP_CSV_URL);
        }

        async function fetchData(url) {
            document.getElementById('status-badge').textContent = "データ読込中...";
            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    allData = results.data;
                    renderMarkers("");
                }
            });
        }

        function renderMarkers(keyword) {
            markers.forEach(m => m.setMap(null));
            markers = [];
            const lowerKeyword = keyword.toLowerCase();
            
            if (allData.length === 0) return;
            
            const keys = Object.keys(allData[0]);
            const latKey = keys.find(k => ['緯度', 'lat'].some(kw => k.toLowerCase().includes(kw)));
            const lngKey = keys.find(k => ['経度', 'lng'].some(kw => k.toLowerCase().includes(kw)));
            const nameKey = keys.find(k => ['名', 'name', 'タイトル', '会社名'].some(kw => k.toLowerCase().includes(kw)));

            const bounds = new google.maps.LatLngBounds();
            let count = 0;

            allData.forEach((row, i) => {
                if (!Object.values(row).some(v => String(v).toLowerCase().includes(lowerKeyword))) return;

                const lat = parseFloat(row[latKey]?.replace(/[^\d.-]/g, ''));
                const lng = parseFloat(row[lngKey]?.replace(/[^\d.-]/g, ''));

                if (!isNaN(lat) && !isNaN(lng)) {
                    const pos = { lat, lng };
                    
                    const marker = new google.maps.Marker({ 
                        position: pos, 
                        map: map,
                        icon: currentUrl === VIP_CSV_URL ? "http://maps.google.com/mapfiles/ms/icons/blue-dot.png" : null
                    });
                    
                    const safeName = (row[nameKey] || `地点 ${i+1}`).replace(/'/g, "\\'");

                    let content = `
                        <div class="info-window-container" id="iw-${i}">
                            <div class="correction-trigger" title="修正依頼" onclick="toggleCorrectionForm('iw-${i}')">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                </svg>
                            </div>
                            <div class="info-header">
                                <div class="info-title">${row[nameKey] || '地点 '+(i+1)}</div>
                            </div>
                            <div class="info-data-area">
                                ${Object.entries(row).map(([k, v]) => {
                                    if (v && v.trim() !== "" && k !== latKey && k !== lngKey && k !== nameKey) {
                                        return `<span class="info-label">${k}</span><div class="info-content-value">${v}</div>`;
                                    }
                                    return '';
                                }).join('')}
                            </div>
                            <div class="correction-form">
                                <p class="text-[11px] font-bold text-red-600 mb-2">修正内容を入力してください</p>
                                <textarea class="correction-textarea" placeholder="例：住所が間違っています。正しくは〇〇です。"></textarea>
                                <button class="correction-submit-btn" onclick="submitCorrection('${safeName}', 'iw-${i}')">内容を送信する</button>
                                <div class="correction-error-msg text-[10px] text-red-500 mt-2 hidden"></div>
                            </div>
                        </div>`;

                    marker.addListener('click', () => {
                        infoWindow.setContent(content);
                        infoWindow.open(map, marker);
                    });
                    markers.push(marker);
                    bounds.extend(pos);
                    count++;
                }
            });

            const badge = document.getElementById('status-badge');
            const isVIP = currentUrl === VIP_CSV_URL;
            badge.textContent = isVIP ? `★ VIPモード: ${count}件` : `${count}件表示中`;
            badge.className = isVIP ? "text-[10px] text-blue-600 font-bold" : "text-[10px] text-gray-400 font-medium";
            
            if (keyword === "" && count > 0) map.fitBounds(bounds);
        }

        window.toggleCorrectionForm = function(id) {
            const container = document.getElementById(id);
            const form = container.querySelector('.correction-form');
            const dataArea = container.querySelector('.info-data-area');
            const isVisible = form.style.display === 'block';
            form.style.display = isVisible ? 'none' : 'block';
            dataArea.style.display = isVisible ? 'block' : 'none';
        };

        window.submitCorrection = async function(companyName, id) {
            const container = document.getElementById(id);
            const textarea = container.querySelector('.correction-textarea');
            const btn = container.querySelector('.correction-submit-btn');
            const errorArea = container.querySelector('.correction-error-msg');
            const comment = textarea.value.trim();

            if (!comment) { errorArea.textContent = "※内容を入力してください。"; errorArea.classList.remove('hidden'); return; }
            btn.disabled = true; btn.innerHTML = "送信中...";

            try {
                const url = `${CORRECTION_GAS_URL}?name=${encodeURIComponent(companyName)}&comment=${encodeURIComponent(comment)}`;
                await fetch(url, { mode: 'no-cors' });
                container.innerHTML = `<div class="py-12 text-center text-green-600 font-bold text-base">送信完了</div>`;
            } catch (e) {
                errorArea.textContent = "送信エラー。"; errorArea.classList.remove('hidden');
                btn.disabled = false; btn.innerHTML = "内容を送信する";
            }
        };

        function searchAddress() {
            const q = document.getElementById('address-search-input').value;
            if (!q) return;
            geocoder.geocode({ address: q }, (res, status) => {
                if (status === 'OK') {
                    map.setCenter(res[0].geometry.location);
                    map.setZoom(17);
                }
            });
        }

        document.getElementById('search-input').addEventListener('input', (e) => renderMarkers(e.target.value));
        document.getElementById('address-search-btn').onclick = searchAddress;
        document.getElementById('address-search-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchAddress(); });

        loadGoogleMaps();
    </script>
</body>
</html>
